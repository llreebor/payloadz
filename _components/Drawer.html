<!-- [START] HTML Drawer -->
<!-- Drawer -->
<div
	id="drawer"
	class="drawer fixed inset-0 z-20 translate-x-full bg-[#CACBD6]/60 opacity-0"
>
	<div
		class="drawer-content ml-auto h-full w-full max-w-[640px] translate-x-full bg-white p-5 transition-all md:w-[80%] sm:w-[90%]"
	>
		<button
			id="drawer_close"
			class="ml-auto flex size-7 max-w-fit items-center justify-center rounded p-2 hover:bg-gray-100"
		>
			<svg
				xmlns="http://www.w3.org/2000/svg"
				width="18"
				height="18"
				viewBox="0 0 18 18"
				fill="none"
			>
				<path
					d="M18 1.81286L16.1871 0L9 7.18714L1.81286 0L0 1.81286L7.18714 9L0 16.1871L1.81286 18L9 10.8129L16.1871 18L18 16.1871L10.8129 9L18 1.81286Z"
					fill="#C2C2C2"
				/>
			</svg>
		</button>

		<div class="mt-10 space-y-10 pl-10 pr-5 sm:mt-0 sm:space-y-5 sm:p-0">
			Content
		</div>
	</div>
</div>

<button id="drawer_trigger">Drawer</button>
<!-- [END] HTML Drawer -->

<!-- [START] JavaScript Drawer -->
<script>
	function toggleDrawer(triggerId, drawerId, closeBtnId, triggersClass = '') {
		const trigger = document.getElementById(triggerId)
		const drawer = document.getElementById(drawerId)
		const content = drawer.querySelector('.drawer-content')
		const closeBtn = document.getElementById(closeBtnId)

		const triggersList = triggersClass
			? document.querySelectorAll(triggersClass)
			: null

		if (triggersList && triggersList.length > 0) {
			triggersList.forEach((item) => {
				item.addEventListener('click', () => {
					drawer.classList.remove('translate-x-full')
					content.classList.remove('translate-x-full')
					drawer.classList.remove('opacity-0')
				})
			})
		}

		trigger?.addEventListener('click', () => {
			drawer.classList.remove('translate-x-full')
			content.classList.remove('translate-x-full')

			drawer.classList.remove('opacity-0')
		})

		closeBtn.addEventListener('click', () => {
			drawer.classList.add('translate-x-full')
			content.classList.add('translate-x-full')

			drawer.classList.add('opacity-0')
		})

		drawer.addEventListener('click', (e) => {
			if (e.target.classList.contains(drawerId)) {
				drawer.classList.add('translate-x-full')
				content.classList.add('translate-x-full')
				drawer.classList.add('opacity-0')
			}
		})
	}

	// Single
	toggleDrawer('drawer_trigger', 'drawer', 'drawer_close')

	// Multiply
	toggleDrawer(null, 'drawer', 'drawer_close', '.drawer_trigger')
</script>

<!-- [END] JavaScript Drawer -->
